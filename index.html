<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Vest Promts | Промты-дополнения для нейросетей</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #051024 0%, #0a1f3a 40%, #0b2647 100%);
      min-height: 100vh;
      color: #e3f0ff;
      padding: 1.8rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: -15%;
      left: -8%;
      width: 65%;
      height: 65%;
      background: radial-gradient(circle at 25% 35%, rgba(0, 140, 255, 0.18), transparent 70%);
      filter: blur(75px);
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      bottom: -10%;
      right: -5%;
      width: 70%;
      height: 70%;
      background: radial-gradient(circle at 80% 80%, rgba(0, 80, 210, 0.22), transparent 70%);
      filter: blur(80px);
      z-index: 0;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 2.2rem;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.5rem;
      animation: fadeSlideDown 0.7s ease-out;
    }

    .logo {
      font-size: clamp(2.8rem, 9vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.8px;
      background: linear-gradient(to right, #b2dcff, #4da8ff, #1e90ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 6px 12px rgba(0,120,255,0.5));
      margin-bottom: 0.1rem;
    }

    .subtitle {
      font-size: 1rem;
      font-weight: 500;
      color: #b8d6ff;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      padding: 0.4rem 1.7rem;
      border-radius: 40px;
      border: 1px solid rgba(70, 150, 255, 0.35);
      display: inline-block;
      letter-spacing: 0.3px;
    }

    .search-wrapper {
      position: relative;
      animation: fadeSlideDown 0.8s ease-out;
    }

    .search-icon {
      position: absolute;
      left: 1.3rem;
      top: 50%;
      transform: translateY(-50%);
      color: #6095d0;
      font-size: 1.2rem;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 1rem 1.2rem 1rem 3.2rem;
      background: rgba(12, 32, 62, 0.7);
      backdrop-filter: blur(20px);
      border: 1.5px solid rgba(60, 130, 255, 0.45);
      border-radius: 60px;
      font-size: 1rem;
      color: #ffffff;
      outline: none;
      transition: all 0.3s ease;
      box-shadow: 0 12px 28px -12px rgba(0, 90, 255, 0.35);
      font-weight: 400;
    }

    #searchInput::placeholder {
      color: #7fa3cc;
      font-weight: 400;
    }

    #searchInput:focus {
      border-color: #4da8ff;
      box-shadow: 0 14px 32px -8px rgba(0, 150, 255, 0.6);
      background: rgba(16, 38, 72, 0.8);
    }

    .prompts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.6rem;
    }

    .prompt-card {
      background: rgba(12, 30, 58, 0.55);
      backdrop-filter: blur(22px);
      border: 1px solid rgba(55, 125, 255, 0.28);
      border-radius: 2rem;
      padding: 1.7rem 1.4rem;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
      box-shadow: 0 18px 30px -14px rgba(0, 25, 70, 0.7);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: fadeInUp 0.7s ease backwards;
      position: relative;
      overflow: hidden;
    }

    .prompt-card:nth-child(1) { animation-delay: 0.1s; }
    .prompt-card:nth-child(2) { animation-delay: 0.2s; }
    .prompt-card:nth-child(3) { animation-delay: 0.3s; }
    .prompt-card:nth-child(4) { animation-delay: 0.4s; }
    .prompt-card:nth-child(5) { animation-delay: 0.5s; }
    .prompt-card:nth-child(6) { animation-delay: 0.6s; }

    .prompt-card::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 100% 0%, rgba(0, 180, 255, 0.18), transparent 65%);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }

    .prompt-card:hover {
      transform: translateY(-7px);
      border-color: rgba(80, 170, 255, 0.75);
      box-shadow: 0 28px 42px -16px #002952;
      background: rgba(14, 36, 70, 0.7);
    }

    .prompt-card:hover::after {
      opacity: 1;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .card-icon {
      font-size: 2rem;
      background: rgba(0, 110, 255, 0.25);
      width: 3rem;
      height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 1.2rem;
      backdrop-filter: blur(10px);
      color: #d4e8ff;
    }

    .card-title {
      font-weight: 650;
      font-size: 1.3rem;
      color: #e3f0ff;
      letter-spacing: -0.2px;
      word-break: break-word;
      line-height: 1.3;
    }

    .card-content {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 1.2rem;
      padding: 1rem 1.1rem;
      font-size: 0.9rem;
      line-height: 1.55;
      color: #cddfff;
      border-left: 3px solid #2f80ed;
      font-family: 'Inter', monospace;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 210px;
      overflow-y: auto;
      backdrop-filter: blur(4px);
      letter-spacing: 0.1px;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      color: #a3c6f5;
      font-size: 0.85rem;
    }

    .badge {
      background: linear-gradient(135deg, #0055cc, #003d80);
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(0,100,255,0.4);
      color: white;
      letter-spacing: 0.3px;
    }

    .copy-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(90, 150, 255, 0.65);
      color: #bedaff;
      padding: 0.4rem 1.1rem;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .copy-btn:hover {
      background: #1a4c8a;
      border-color: #8ac4ff;
      color: white;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3.5rem;
      color: #a2c8f2;
      font-size: 1.2rem;
      background: rgba(255,255,255,0.03);
      border-radius: 2rem;
      backdrop-filter: blur(14px);
    }

    @keyframes fadeSlideDown {
      0% { opacity: 0; transform: translateY(-25px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      body {
        padding: 1.2rem 0.7rem;
      }
      .prompts-grid {
        grid-template-columns: 1fr;
      }
      .card-content {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">Vest Promts</h1>
      <span class="subtitle">📋 дополнения к запросу для нейросети</span>
    </header>

    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Поиск по названию или содержимому промта..." autocomplete="off">
    </div>

    <div class="prompts-grid" id="promptsContainer"></div>
  </div>

  <script>
    (function() {
      // 5 придуманных промтов-дополнений + Премиум эмодзи (как дополнение к запросу)
      const promptsData = [
        {
          title: "🤖 Умный Telegram бот",
          icon: "🤖",
          content: `Дополнение к запросу:\nСоздай Telegram бота с использованием исключительно премиум эмодзи в сообщениях и инлайн-кнопках. Используй parse_mode='HTML' и теги <tg-emoji emoji-id=\"...\">. Пример кнопки: InlineKeyboardButton(text=\"Профиль\", icon_custom_emoji_id=\"5870994129244131212\"). Не применять обычные эмодзи.`,
          tag: "бот"
        },
        {
          title: "📊 Дашборд статистики",
          icon: "📊",
          content: `Дополнение к запросу:\nОформи сообщение со статистикой бота, применяя премиум эмодзи: график роста (5870930636742595124), статистика (5870921681735781843), деньги (5904462880941545555). Все иконки только через tg-emoji. Добавь кнопку «Обновить» с icon_custom_emoji_id=\"5345906554510012647\".`,
          tag: "аналитика"
        },
        {
          title: "🔐 Доступ и подписка",
          icon: "🔐",
          content: `Дополнение к запросу:\nРеализуй проверку подписки с замком: закрытый id=6037249452824072506, открытый id=6037496202990194718. Кнопка «Подписаться» с иконкой ссылки (5769289093221454192). Используй только премиум эмодзи, обычные не вставлять.`,
          tag: "безопасность"
        },
        {
          title: "📅 Напоминания и дедлайны",
          icon: "📅",
          content: `Дополнение к запросу:\nСоздай систему напоминаний с календарём (5890937706803894250) и часами (5983150113483134607). Все сообщения через HTML и tg-emoji. Кнопка «Отложить» с иконкой времени (5775896410780079073).`,
          tag: "органайзер"
        },
        {
          title: "🎁 Промо-рассылка",
          icon: "🎁",
          content: `Дополнение к запросу:\nСделай шаблон рассылки с подарком (6032644646587338669) и рупором (6039422865189638057). Кнопка «Получить» с иконкой скачать (6039802767931871481). Только премиум эмодзи, parse_mode HTML.`,
          tag: "маркетинг"
        },
        {
          title: "⭐ Премиум эмодзи (шпаргалка)",
          icon: "✨",
          content: `Дополнение к запросу:\nИспользуй следующие премиум эмодзи в боте:\n⚙ Настройки 5870982283724328568\n👤 Профиль 5870994129244131212\n👥 Люди 5870772616305839506\n✅ Галочка 5870633910337015697\n❌ Крестик 5870657884844462243\n📁 Файл 5870528606328852614\n🔒 Замок закрытый 6037249452824072506\n🔓 Замок открытый 6037496202990194718\n📣 Рупор 6039422865189638057\n🗑 Мусорный бак 5870875489362513438\n🔗 Ссылка 5769289093221454192\nℹ Инфо 6028435952299413210\n🤖 Бот 6030400221232501136\n👁 Глаз 6037397706505195857\n🎁 Подарок 6032644646587338669\n⏰ Часы 5983150113483134607\n🎉 Ура 6041731551845159060\n📅 Календарь 5890937706803894250\n🪙 Деньги 5904462880941545555\n🔨 Код </> 5940433880585605708\n🔄 Загрузка 5345906554510012647\n◁ Назад (для кнопки назад)\n\nПример инлайн-кнопки:\nicon_custom_emoji_id=\"6039450962865688331"`,
          tag: "премиум"
        }
      ];

      const container = document.getElementById('promptsContainer');
      const searchInput = document.getElementById('searchInput');

      function escapeHtml(text) {
        const map = {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#039;'
        };
        return String(text).replace(/[&<>"']/g, m => map[m]);
      }

      function formatContent(text) {
        // Заменяем переносы строк на <br> для красивого отображения
        return escapeHtml(text).replace(/\n/g, '<br>');
      }

      function renderCards(filterText = '') {
        const lowerFilter = filterText.toLowerCase().trim();
        
        const filtered = promptsData.filter(prompt => {
          if (lowerFilter === '') return true;
          return prompt.title.toLowerCase().includes(lowerFilter) || 
                 prompt.content.toLowerCase().includes(lowerFilter) ||
                 prompt.tag.toLowerCase().includes(lowerFilter);
        });

        if (filtered.length === 0) {
          container.innerHTML = `<div class="no-results">🔍 Ничего не найдено по запросу «${escapeHtml(filterText)}»</div>`;
          return;
        }

        container.innerHTML = filtered.map(prompt => {
          return `
            <div class="prompt-card">
              <div class="card-header">
                <div class="card-icon">${escapeHtml(prompt.icon)}</div>
                <div class="card-title">${escapeHtml(prompt.title)}</div>
              </div>
              <div class="card-content">${formatContent(prompt.content)}</div>
              <div class="card-footer">
                <span class="badge">${escapeHtml(prompt.tag)}</span>
                <button class="copy-btn" data-content="${escapeHtml(prompt.content)}">
                  📋 Копировать
                </button>
              </div>
            </div>
          `;
        }).join('');

        // Навешиваем обработчики копирования
        document.querySelectorAll('.copy-btn').forEach(btn => {
          btn.addEventListener('click', function(e) {
            const contentToCopy = this.getAttribute('data-content');
            // Декодируем обратно HTML-сущности для корректного текста в буфере
            const textArea = document.createElement('textarea');
            textArea.value = decodeHtmlEntities(contentToCopy);
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              const originalText = this.innerHTML;
              this.innerHTML = '✅ Скопировано';
              setTimeout(() => {
                this.innerHTML = originalText;
              }, 1500);
            } catch (err) {
              alert('Не удалось скопировать');
            }
            document.body.removeChild(textArea);
          });
        });
      }

      function decodeHtmlEntities(text) {
        const txt = document.createElement('textarea');
        txt.innerHTML = text;
        return txt.value;
      }

      // Поиск с debounce
      let debounceTimer;
      searchInput.addEventListener('input', function(e) {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          renderCards(this.value);
        }, 300);
      });

      // Инициализация
      renderCards();
    })();
  </script>
</body>
</html>
